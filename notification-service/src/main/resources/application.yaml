spring:
  application:
    name: notification-service
#  data:
#    mongodb:
#      uri: mongodb://localhost:27017/your-db
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: paymentGroup,orderGroup
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
        spring.json.type.mapping: orderConfirmation:com.gsk.notification.kafka.order.OrderConfirmation,paymentConfirmation:com.gsk.notification.kafka.payment.PaymentConfirmation

server:
  port: 9095

eureka:
  client:
    service-url:
      ## Comment datasource part when you are running docker-compose
      defaultZone: http://service-registry:8761/eureka/
#      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}