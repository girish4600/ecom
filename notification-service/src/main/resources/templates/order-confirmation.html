<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
            color: #333333;
        }

        .container {
            max-width: 850px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            color: #2c3e50;
        }

        .success {
            color: #27ae60;
            font-weight: bold;
            font-size: 20px;
        }

        .summary {
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .summary table {
            width: 100%;
            border-collapse: collapse;
        }

        .summary td {
            padding: 12px;
            border-bottom: 1px solid #dddddd;
        }

        .products {
            margin-top: 20px;
        }

        .products table {
            width: 100%;
            border-collapse: collapse;
        }

        .products th {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
        }

        .products td {
            padding: 12px;
            border-bottom: 1px solid #dddddd;
        }

        .amount {
            color: #27ae60;
            font-weight: bold;
            font-size: 18px;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #888888;
            font-size: 13px;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="header">
        <h2>Order Confirmation</h2>
        <p class="success">Your order has been placed successfully</p>
    </div>

    <p>
        Hello <strong th:text="${customerName}"></strong>,
    </p>

    <p>
        Thank you for your order. Here are your order details:
    </p>

    <div class="summary">
        <table>
            <tr>
                <td><strong>Order Reference</strong></td>
                <td th:text="${orderReference}"></td>
            </tr>

            <tr>
                <td><strong>Total Amount</strong></td>
                <td class="totalAmount">
                    ₹ <span th:text="${totalAmount}"></span>
                </td>
            </tr>

            <tr>
                <td><strong>Order Status</strong></td>
                <td>CONFIRMED</td>
            </tr>
        </table>
    </div>

    <div class="products">
        <h3>Ordered Products</h3>

        <table>
            <thead>
            <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="product : ${products}">
                <td>
                    <strong th:text="${product.productName}"></strong>
                    <br/>
                    <small th:text="${product.categoryDescription}"></small>
                </td>

                <td th:text="${product.categoryName}"></td>

                <td th:text="${product.quantity}"></td>

                <td>
                    ₹ <span th:text="${product.price}"></span>
                </td>

                <td>
                    ₹ <span th:text="${product.price * product.quantity}"></span>
                </td>
            </tr>

            </tbody>
        </table>
    </div>

    <div class="footer">
        <p>Thank you for shopping with us.</p>
    </div>

</div>

</body>
</html>
