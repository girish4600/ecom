spring:
  application:
    name: payment-service
  ## Comment datasource part when you are running docker-compose
#  datasource:
#    url: jdbc:mysql://localhost:3306/payment_db?useSSL=false&serverTimezone=UTC
#    username: root
#    password: root
#    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: paymentConfirmation:com.gsk.payment.kafka.model.PaymentNotificationRequest
server:
  port: 9094

eureka:
  client:
    service-url:
#      defaultZone: http://localhost:8761/eureka
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}