server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:
            - id: customer-service
              uri: lb:http://CUSTOMER-SERVICE
              predicates:
                - Path=/v1/customer/**

            - id: product-service
              uri: lb:http://PRODUCT-SERVICE
              predicates:
                - Path=/v1/product/**

            - id: order-service
              uri: lb:http://ORDER-SERVICE
              predicates:
                - Path=/v1/order/**

            - id: payment-service
              uri: lb:http://PAYMENT-SERVICE
              predicates:
                - Path=/v1/payment/**

            - id: notification-service
              uri: lb:http://notification-service
              predicates:
                - Path=/v1/notification/**

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/